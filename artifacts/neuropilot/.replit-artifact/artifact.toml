kind = "web"
previewPath = "/"
title = "NeuroPilot"
version = "1.0.0"
id = "artifacts/neuropilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20844

[services.development]
run = "pnpm --filter @workspace/neuropilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neuropilot", "run", "build" ]
publicDir = "artifacts/neuropilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20844"
BASE_PATH = "/"
